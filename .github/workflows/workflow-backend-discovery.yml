name: CI Pipeline for discovery Module

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

jobs:
  code-quality-discovery:
    name: Lint do módulo .
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
      
      #- name: Run spotless check
      #  run: mvn -B -f ./pom.xml spotless:check

      - name: Run Checkstyle
        run: mvn -B -f ./pom.xml checkstyle:check

      - name: Generate Checkstyle report
        run: mvn -B -f ./pom.xml checkstyle:checkstyle

      - name: Run PMD check
        run: mvn -B -f ./pom.xml pmd:check

      - name: generate PMD report
        run: mvn -B -f ./pom.xml pmd:pmd
      
      - name: Run spotbugs check
        run: mvn -B -f ./pom.xml spotbugs:check

      - name: Generate SpotBugs report
        run: mvn -B -f ./pom.xml spotbugs:spotbugs
  
  test-discovery:
    needs: [code-quality-discovery]
    name: Execute Unit tests for Discovery Module
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
  
      - name: Roda os testes do módulo .
        run: mvn -B -f ./pom.xml clean package
      - name: Run Code Quality Analysis do módulo .
        run: mvn -B -f ./pom.xml jacoco:report
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          use_oidc: true
          files: target/site/jacoco/jacoco.xml
          flags: service-discovery
          name: service-discovery
          fail_ci_if_error: false
          verbose: true
      - name: Upload Coverage Report do módulo .
        uses: actions/upload-artifact@v6
        with:
          name: coverage-report
          path: ./target/site/jacoco/
          retention-days: 1

  build-discovery:
    needs: [test-discovery]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
      - name: Build . module
        run: mvn -B -f ./pom.xml clean package -DskipTests
      
      - name: Upload Backend Artifact
        uses: actions/upload-artifact@v6
        with:
          name: service-discovery-jar
          path: ./target/*.jar
          retention-days: 1

